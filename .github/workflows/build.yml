name: Flutter Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. कोड चेकआउट करना
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. जावा एनवायरनमेंट सेट करना
      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. फ़्लटर सेट करना
      - name: Set up Flutter
        uses: actions/subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # 4. डिपेंडेंसीज इंस्टॉल करना और रूट (बाहर) से सीधे बिल्ड करना
      - name: Install Dependencies & Build APK
        run: |
          # हम किसी फ़ोल्डर के अंदर नहीं जाएँगे, सीधा बाहर ही कमांड रन करेंगे
          flutter pub get
          flutter build apk --release

      # 5. जनरेट हुई एपीके को अपलोड करना
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: free-pixel-converter-apk
          path: "build/app/outputs/flutter-apk/app-release.apk"
