name: Flutter Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. कोड चेकआउट करना
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. जावा एनवायरनमेंट सेट करना
      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. फ़्लटर सेट करना (पुराने प्रोजेक्ट के लिए 3.19.0 बेस्ट है)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # 4. पुराने एम्बेडिंग एरर को बाईपास करके बिल्ड करना
      - name: Fix Path & Build APK
        run: |
          echo "🔍 प्रोजेक्ट फोल्डर चेक किया जा रहा है..."
          
          # अगर स्क्रिप्ट डबल फोल्डर वाली एरर दे रही है, तो हम एक नकली रास्ता (Symlink) बना देते हैं ताकि फ्लटर को फाइल मिल ही जाए
          mkdir -p free-pixel-converter/free-pixel-converter
          ln -s $(pwd)/android free-pixel-converter/free-pixel-converter/android
          
          echo "🚀 डिपेंडेंसीज गेट की जा रही हैं..."
          flutter pub get
          
          echo "📦 एपीके बिल्ड शुरू..."
          # पुराने ऐप्स के लिए कभी-कभी null-safety बंद करनी पड़ती है, हम इसे सेफ साइड लेकर चल रहे हैं
          flutter build apk --release --no-sound-null-safety || flutter build apk --release

      # 5. बनी हुई एपीके को अपलोड करना
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: free-pixel-converter-apk
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
