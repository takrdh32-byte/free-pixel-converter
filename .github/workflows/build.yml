name: Flutter Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. कोड चेकआउट करना
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. जावा एनवायरनमेंट सेट करना
      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. फ़्लटर सेट करना
      - name: Set up Flutter
        uses: actions/subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # 4. डिपेंडेंसीज इंस्टॉल करना और सही फ़ोल्डर ढूंढना
      - name: Install Dependencies & Build
        run: |
          # जहाँ pubspec.yaml है, उस फ़ोल्डर को ढूंढो
          TARGET_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          echo "Found project directory at: $TARGET_DIR"
          cd "$TARGET_DIR"
          
          # डिपेंडेंसी गेट करना
          flutter pub get
          
          # एपीके बिल्ड करना (v2 एम्बेडिंग एरर से बचने के लिए सीधा कमांड)
          flutter build apk --release

      # 5. बनी हुई एपीके को अपलोड करना
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: free-pixel-converter-apk
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
