name: Flutter Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. कोड चेकआउट करना
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. जावा सेटअप (JDK 17)
      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. फ्लटर सेटअप
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # 4. डिपेंडेंसीज़ इंस्टॉल करना (डबल फ़ोल्डर के अंदर जाकर)
      - name: Install Dependencies
        run: |
          cd free-pixel-converter
          flutter pub get

      # 5. रिलीज एपीके बिल्ड करना (डबल फ़ोल्डर के अंदर जाकर)
      - name: Build APK
        run: |
          cd free-pixel-converter
          flutter build apk --release

      # 6. जनरेट हुई एपीके को अपलोड करना
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: free-pixel-converter-apk
          path: free-pixel-converter/build/app/outputs/flutter-apk/app-release.apk
