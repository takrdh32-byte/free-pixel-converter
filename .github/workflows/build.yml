name: Android Kotlin Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. कोड चेकआउट करना
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. जावा एनवायरनमेंट सेट करना
      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. ग्रैडल को ऑटोमैटिकली सेटअप करना (gradlew फाइल न होने पर भी यह काम करेगा)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      # 4. कोटलिन ऐप की रिलीज एपीके सीधे ग्रैडल कमांड से बिल्ड करना
      - name: Build APK with Gradle
        run: gradle assembleRelease

      # 5. बनी हुई एपीके को गिटहब पर अपलोड करना
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-app-release-apk
          path: "app/build/outputs/apk/release/*-release-unsigned.apk"
