name: Flutter Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. कोड चेकआउट करना
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. जावा सेटअप (JDK 17)
      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. फ्लटर सेटअप
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # 4. ऑटोमैटिक डिपेंडेंसीज़ इंस्टॉल (प्रोजेक्ट फ़ोल्डर खुद ढूंढेगा)
      - name: Install Dependencies
        run: |
          TARGET_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          echo "Found project root at: $TARGET_DIR"
          cd "$TARGET_DIR"
          flutter pub get

      # 5. ऑटोमैटिक रिलीज एपीके बिल्ड (प्रोजेक्ट फ़ोल्डर खुद ढूंढेगा)
      - name: Build APK
        run: |
          TARGET_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          cd "$TARGET_DIR"
          flutter build apk --release

      # 6. जनरेट हुई एपीके को ऑटोमैटिकली अपलोड करना
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: free-pixel-converter-apk
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
