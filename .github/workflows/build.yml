name: Flutter Android Build

on:
  push:
    branches:
      - main

# यहाँ हमने गिटहब को साफ़ बता दिया कि प्रोजेक्ट अंदर वाले फ़ोल्डर में है
defaults:
  run:
    working-directory: free-pixel-converter

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. कोड चेकआउट करना (यह हमेशा मुख्य रूट पर होता है)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. जावा सेटअप (JDK 17)
      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. फ्लटर सेटअप (Stable Version 3.19.0)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # 4. डिपेंडेंसीज़ इंस्टॉल करना
      - name: Install Dependencies
        run: flutter pub get

      # 5. रिलीज एपीके बिल्ड करना
      - name: Build APK
        run: flutter build apk --release

      # 6. जनरेट हुई एपीके को अपलोड करना
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: free-pixel-converter-apk
          path: free-pixel-converter/build/app/outputs/flutter-apk/app-release.apk
